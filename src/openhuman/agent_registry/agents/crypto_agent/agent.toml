id = "crypto_agent"
display_name = "Crypto Agent"
delegate_name = "do_crypto"
when_to_use = "Crypto wallet & market specialist — drives wallet balances, quotes, transfers, swaps, contract calls, exchange trading workflows, and x402 paid API requests on the user's connected wallet identities. Use whenever a request is about on-chain balances, sending/receiving tokens, swapping or routing across chains, signing a contract call, executing/inspecting market orders on a connected crypto exchange, or making HTTP requests to x402-payable APIs (HTTP 402 Payment Required with on-chain USDC settlement). Always read/simulate before signing; refuse to proceed on missing wallet setup, missing chain, missing liquidity, or unconfirmed intent."
temperature = 0.2
max_iterations = 8
sandbox_mode = "none"

# Crypto agent has a tight single-purpose voice and gets its own safety
# rules from the prompt body — the global identity/skills boilerplate
# would dilute them, but the standard safety preamble stays on as a
# belt-and-suspenders gate on financial-risk actions.
omit_identity = true
omit_memory_context = true
omit_safety_preamble = false
omit_skills_catalog = true
# No eager memory pre-fetch. A pure-function wallet/market specialist with
# `omit_memory_context = true`; the orchestrator hands it a focused, already-
# grounded request, so it never needed the per-turn memory-tree walk.

[model]
hint = "agentic"

[tools]
# Narrow allowlist. Wallet + web3 + market primitives only — no shell, no
# file_write, no broad HTTP, no integration delegation. Wallet names line up
# with the wallet RPC controllers in `src/openhuman/wallet/schemas.rs`
# (read: status/balances/supported_assets/chain_status + tx_status/tx_receipt/
# lookup_tx; quote/prepare: prepare_transfer; execute: execute_prepared). The
# higher-level swap/bridge/dapp surface lives in the `web3_*` tools, which
# build on the wallet's signing primitives. Tools that aren't yet registered
# are silently dropped by the tool filter at spawn time, so this list also
# describes the agent's *intended* tool surface as wallet + exchange tools land.
named = [
    # Read-only wallet inspection.
    "wallet_status",
    "wallet_balances",
    "wallet_network_defaults",
    "wallet_supported_assets",
    "wallet_chain_status",
    "wallet_encode_erc20_transfer",
    # Transaction inspection — status / receipt / raw lookup by hash.
    "wallet_tx_status",
    "wallet_tx_receipt",
    "wallet_lookup_tx",
    # Quote / prepare a native or token transfer. MUST be called before
    # wallet_execute_prepared — returns a deterministic transaction blob
    # plus fee estimate the agent shows the user for confirmation.
    "wallet_prepare_transfer",
    # Sign + broadcast a previously-prepared blob. Refuses to fabricate
    # parameters — only consumes a `quoteId` returned by the matching
    # wallet_prepare_* call earlier in this turn.
    "wallet_execute_prepared",
    # High-level web3: swaps (same-chain), bridges (cross-chain), and
    # generic EVM dapp calls. Each quote/call returns a quoteId that MUST
    # be confirmed via the matching web3_*_execute before broadcast.
    "web3_swap_routes",
    "web3_swap_quote",
    "web3_swap_execute",
    "web3_bridge_quote",
    "web3_bridge_execute",
    "web3_dapp_call",
    "web3_dapp_execute",
    # Market data — crypto series, FX rates, commodities — for grounding
    # quote sanity checks and price questions before any execute step.
    "stock_quote",
    "stock_exchange_rate",
    "stock_crypto_series",
    # Confirmation gate — the agent MUST call this before any
    # wallet_execute_prepared / write-side exchange order. The runtime
    # routes the prompt to the user and blocks until they reply.
    "ask_user_clarification",
    # Time grounding for "as of <when>" framing and freshness checks on
    # quotes before execute.
    "current_time",
    # x402 HTTP 402 payment protocol — makes paid API requests by signing
    # an on-chain payment (EVM EIP-3009 on Base/Ethereum or Solana SPL)
    # and retrying with a PAYMENT-SIGNATURE header.
    "x402_request",
]
